<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Candidats</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f4f6f9; }
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input[type="text"] { width: 95%; padding: 10px; margin: 10px 0; }
        button { background: #1d70b8; color: white; padding: 10px 15px; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #1d70b8; color: white; }
        .qr-thumb { width: 50px; height: 50px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Ajouter un candidat</h2>
        <form method="POST">
            <label>Nom :</label>
            <input type="text" name="nom" required placeholder="Ex: MALEKANI">
            <label>Prénom :</label>
            <input type="text" name="prenom" required placeholder="Ex: BYALENGA JACQUES">
            <button type="submit">Enregistrer et créer le QR Code</button>
        </form>
    </div>

    <h2>Liste des candidats enregistrés</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Nom & Prénom</th>
            <th>Aperçu Page</th>
            <th>QR Code (À imprimer)</th>
        </tr>
        {% for c in candidats %}
        <tr>
            <td>{{ c[0] }}</td>
            <td>**{{ c[1] }}** {{ c[2] }}</td>
            <td><a href="/candidat/{{ c[0] }}" target="_blank">Ouvrir la page</a></td>
            <td>
                <img class="qr-thumb" src="/static/qr_{{ c[0] }}.png" alt="QR">
                <br>
                <a href="/static/qr_{{ c[0] }}.png" download>Télécharger</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
